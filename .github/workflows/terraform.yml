name: CD Terraform

on:
  push:
    branches: [ "QA", "main" ]

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref }}" == "refs/heads/QA" ]; then
            echo "ENV_SUFFIX=_QA" >> $GITHUB_ENV
            echo "TF_DIR=infra/terraform/environments/qa" >> $GITHUB_ENV
          else
            echo "ENV_SUFFIX=_PROD" >> $GITHUB_ENV
            echo "TF_DIR=infra/terraform/environments/prod" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets[format('AWS_ACCESS_KEY_ID{0}', env.ENV_SUFFIX)] }}
          aws-secret-access-key: ${{ secrets[format('AWS_SECRET_ACCESS_KEY{0}', env.ENV_SUFFIX)] }}
          aws-session-token: ${{ secrets[format('AWS_SESSION_TOKEN{0}', env.ENV_SUFFIX)] }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var="key_name=${{ secrets[format('EC2_KEY_NAME{0}', env.ENV_SUFFIX)] }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var="key_name=${{ secrets[format('EC2_KEY_NAME{0}', env.ENV_SUFFIX)] }}"
