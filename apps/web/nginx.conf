server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loading
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://MS_CORE_IP:3000/auth/;
    }

    location /aliases/ {
        proxy_pass http://MS_CORE_IP:3001/aliases/;
    }

    location /api/v1/complaints {
        proxy_pass http://MS_PROCESSING_IP:3003/api/v1/complaints;
    }

    location /admin/ {
        proxy_pass http://MS_PROCESSING_IP:3009/admin/;
    }

    location /status/ {
        proxy_pass http://MS_STATUS_IP:3006/status/;
    }

    # WebSocket Proxy for ms-status real-time events
    location /ws/status {
        proxy_pass http://MS_STATUS_IP:3006/ws/status;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static files (images, css, js)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
