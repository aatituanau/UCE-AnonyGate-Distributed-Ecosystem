name: CD Microservices (Docker & Deploy)

on:
  workflow_dispatch:
  push:
    branches: [ "QA", "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/anonygate

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [ms-auth, ms-alias, ms-submission, ms-admin, ms-status, ms-forms, web, ms-audit]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Copy shared-proto to service context
        run: cp -r apps/shared-proto apps/${{ matrix.service }}/shared-proto || true
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}
    steps:
      - name: Start Postgres Database
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DB_POSTGRES_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_HOST_NGINX }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
            fi
            # Start existing container, or create it if it doesn't exist yet
            # Data is persisted in /home/ubuntu/postgres_data (bind-mount, survives prune)
            sudo docker start postgres || sudo docker run -d --name postgres --restart unless-stopped -v /home/ubuntu/postgres_data:/var/lib/postgresql/data -e POSTGRES_USER=anonygate -e POSTGRES_PASSWORD=anonygate_pass -e POSTGRES_DB=anonygate_db -p 5432:5432 postgres:16-alpine

      - name: Start Redis and Kafka Brokers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DB_QUEUES_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_HOST_NGINX }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
            fi
            
            # Redis
            sudo docker start redis || sudo docker run -d --name redis --restart unless-stopped -p 6379:6379 redis:7-alpine redis-server --requirepass anonygate_pass
            
            # Zookeeper
            sudo docker start zookeeper || sudo docker run -d --name zookeeper --restart unless-stopped -p 2181:2181 -e ZOOKEEPER_CLIENT_PORT=2181 -e ZOOKEEPER_TICK_TIME=2000 confluentinc/cp-zookeeper:7.5.0
            
            # Kafka
            PRIVATE_IP=$(hostname -I | awk '{print $1}')
            sudo docker start kafka || sudo docker run -d --name kafka --restart unless-stopped -p 9092:9092 -e KAFKA_BROKER_ID=1 -e KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181 -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://$PRIVATE_IP:9092 -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 --link zookeeper confluentinc/cp-kafka:7.5.0
      - name: Deploy Microservices via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_MS_CORE }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_HOST_NGINX }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting for cloud-init to finish..."
            while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done
            
            if ! command -v docker &> /dev/null; then
              echo "Docker not found! Forcing installation..."
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose
            fi
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Build env file from GitHub Secrets — never hardcode credentials
            echo "DATABASE_URL_AUTH=postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=public" > .env
            echo "DATABASE_URL_ALIAS=postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=alias" >> .env
            echo "DATABASE_URL_SUBMISSION=postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=complaints" >> .env
            echo "MONGO_URI=mongodb://anonygate:anonygate_pass@${{ secrets.DB_MONGO_IP }}:27017/DB_Forms?authSource=admin" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "REDIS_HOST=${{ secrets.DB_QUEUES_IP }}" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=anonygate_pass" >> .env
            echo "KAFKA_BROKER=${{ secrets.DB_QUEUES_IP }}:9092" >> .env

            # Free disk space before pulling new images
            sudo docker system prune -af --volumes

            # Create Docker network if it doesn't exist
            sudo docker network create anonygate-net || true

            # Pull latest images from GHCR
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-auth:latest
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-alias:latest
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-forms:latest

            # Deploy MS-Auth (Zero Downtime Strategy)
            echo "Starting Replica Test for ms-auth..."
            sudo docker run -d --name ms-auth-test --network anonygate-net --env-file .env -e DATABASE_URL="postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=public" ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-auth:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-auth-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-auth-test
              sudo docker stop ms-auth || true
              sudo docker rm ms-auth || true
              sudo docker run -d --name ms-auth --network anonygate-net -p 3000:3000 --env-file .env -e DATABASE_URL="postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=public" --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-auth:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-auth-test
              exit 1
            fi

            # ── DATABASE SEED ─────────────────────────────────────────────────
            sleep 10
            echo "Running database seed..."
            sudo docker exec ms-auth npx prisma db seed || true

            # Deploy MS-Alias (Zero Downtime Strategy)
            echo "Starting Replica Test for ms-alias..."
            sudo docker run -d --name ms-alias-test --network anonygate-net --env-file .env -e DATABASE_URL="postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=alias" ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-alias:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-alias-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-alias-test
              sudo docker stop ms-alias || true
              sudo docker rm ms-alias || true
              sudo docker run -d --name ms-alias --network anonygate-net -p 3001:3001 -p 50051:50051 --env-file .env -e DATABASE_URL="postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=alias" --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-alias:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-alias-test
              exit 1
            fi

            # Deploy MS-Forms (Zero Downtime Strategy)
            echo "Starting Replica Test for ms-forms..."
            sudo docker run -d --name ms-forms-test --network anonygate-net --env-file .env ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-forms:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-forms-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-forms-test
              sudo docker stop ms-forms || true
              sudo docker rm ms-forms || true
              sudo docker run -d --name ms-forms --network anonygate-net -p 3004:3004 --env-file .env --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-forms:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-forms-test
              exit 1
            fi

            echo "Waiting 5 seconds to see if containers survive..."
            sleep 5

            echo "=== LOGS DE MS-AUTH ==="
            sudo docker logs ms-auth

            echo "=== LOGS DE MS-ALIAS ==="
            sudo docker logs ms-alias
            
            echo "=== LOGS DE MS-FORMS ==="
            sudo docker logs ms-forms



      - name: Deploy Processing Microservices via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_MS_PROCESSING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_HOST_NGINX }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting for cloud-init to finish..."
            while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done
            
            if ! command -v docker &> /dev/null; then
              echo "Docker not found! Forcing installation..."
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose
            fi
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "DATABASE_URL=postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=complaints" > .env
            echo "ALIAS_GRPC_URL=${{ secrets.EC2_HOST_MS_CORE }}:50051" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "REDIS_HOST=${{ secrets.DB_QUEUES_IP }}" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=anonygate_pass" >> .env
            echo "KAFKA_BROKER=${{ secrets.DB_QUEUES_IP }}:9092" >> .env
            echo "RABBITMQ_URL=amqp://guest:guest@${{ secrets.DB_QUEUES_IP }}:5672" >> .env
            echo "MQTT_BROKER_URL=mqtt://${{ secrets.DB_QUEUES_IP }}:1883" >> .env

            sudo docker system prune -af --volumes
            sudo docker network create anonygate-net || true
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-submission:latest

            echo "Starting Replica Test for ms-submission..."
            sudo docker run -d --name ms-submission-test --network anonygate-net --env-file .env ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-submission:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-submission-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-submission-test
              sudo docker stop ms-submission || true
              sudo docker rm ms-submission || true
              sudo docker run -d --name ms-submission --network anonygate-net -p 3003:3003 --env-file .env --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-submission:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-submission-test
              exit 1
            fi
            
            echo "Running MS-Submission database push..."
            sleep 5
            sudo docker exec ms-submission npx prisma db push --schema=prisma/schema.prisma || true

            echo "=== LOGS DE MS-SUBMISSION ==="
            sudo docker logs ms-submission

            # Deploy MS-Admin (Zero Downtime Strategy)
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-admin:latest

            echo "Starting Replica Test for ms-admin..."
            sudo docker run -d --name ms-admin-test --network anonygate-net --env-file .env -e DATABASE_URL="postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=public" ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-admin:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-admin-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-admin-test
              sudo docker stop ms-admin || true
              sudo docker rm ms-admin || true
              sudo docker run -d --name ms-admin --network anonygate-net -p 3009:3009 --env-file .env -e DATABASE_URL="postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=public" --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-admin:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-admin-test
              exit 1
            fi
            
            echo "=== LOGS DE MS-ADMIN ==="
            sudo docker logs ms-admin

      - name: Deploy Status Microservice via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_MS_STATUS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_HOST_NGINX }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting for cloud-init to finish..."
            while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done
            
            if ! command -v docker &> /dev/null; then
              echo "Docker not found! Forcing installation..."
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose
            fi
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "DATABASE_URL=postgresql://anonygate:anonygate_pass@${{ secrets.DB_POSTGRES_IP }}:5432/anonygate_db?schema=status" > .env
            echo "MONGO_URI=mongodb://anonygate:anonygate_pass@${{ secrets.DB_MONGO_IP }}:27017/DB_Audit?authSource=admin" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "REDIS_HOST=${{ secrets.DB_QUEUES_IP }}" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=anonygate_pass" >> .env
            echo "KAFKA_BROKER=${{ secrets.DB_QUEUES_IP }}:9092" >> .env
            echo "RABBITMQ_URL=amqp://guest:guest@${{ secrets.DB_QUEUES_IP }}:5672" >> .env
            echo "MQTT_BROKER_URL=mqtt://${{ secrets.DB_QUEUES_IP }}:1883" >> .env

            sudo docker system prune -af --volumes
            sudo docker network create anonygate-net || true
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-status:latest
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-audit:latest

            echo "Starting Replica Test for ms-status..."
            sudo docker run -d --name ms-status-test --network anonygate-net --env-file .env ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-status:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-status-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-status-test
              sudo docker stop ms-status || true
              sudo docker rm ms-status || true
              sudo docker run -d --name ms-status --network anonygate-net -p 3006:3006 --env-file .env --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-status:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-status-test
              exit 1
            fi
            
            echo "Running MS-Status database push..."
            sleep 5
            sudo docker exec ms-status npx prisma db push --schema=prisma/schema.prisma || true

            echo "=== LOGS DE MS-STATUS ==="
            sudo docker logs ms-status

            # Deploy MS-Audit (Zero Downtime Strategy)
            echo "Starting Replica Test for ms-audit..."
            sudo docker run -d --name ms-audit-test --network anonygate-net --env-file .env ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-audit:latest
            sleep 10
            if [ "$(sudo docker inspect -f '{{.State.Running}}' ms-audit-test)" == "true" ]; then
              echo "Replica stable. Replacing old instance..."
              sudo docker rm -f ms-audit-test
              sudo docker stop ms-audit || true
              sudo docker rm ms-audit || true
              sudo docker run -d --name ms-audit --network anonygate-net -p 3005:3005 --env-file .env --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-ms-audit:latest
            else
              echo "Deploy failed. Old instance remains active."
              sudo docker rm -f ms-audit-test
              exit 1
            fi

            echo "=== LOGS DE MS-AUDIT ==="
            sleep 5
            sudo docker logs ms-audit

      - name: Deploy Frontend to Nginx Host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_NGINX }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting for cloud-init to finish..."
            while [ ! -f /var/lib/cloud/instance/boot-finished ]; do sleep 5; done
            
            if ! command -v docker &> /dev/null; then
              echo "Docker not found! Forcing installation..."
              sudo apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
            fi
            
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-web:latest
            
            sudo docker stop web || true
            sudo docker rm web || true
            
            # Clean up the old container name from previous versions to free port 8080
            sudo docker stop frontend-client || true
            sudo docker rm frontend-client || true
            
            # Run the frontend container on port 8080 of the Nginx machine
            sudo docker run -d --name web \
              -p 8080:80 \
              -e VITE_API_AUTH_URL="http://${{ secrets.EC2_HOST_NGINX }}" \
              -e VITE_API_ALIAS_URL="http://${{ secrets.EC2_HOST_NGINX }}" \
              -e VITE_API_SUBMISSION_URL="http://${{ secrets.EC2_HOST_NGINX }}" \
              -e VITE_API_ADMIN_URL="http://${{ secrets.EC2_HOST_NGINX }}" \
              -e VITE_API_STATUS_URL="http://${{ secrets.EC2_HOST_NGINX }}" \
              -e VITE_API_FORMS_URL="http://${{ secrets.EC2_HOST_NGINX }}/graphql" \
              -e VITE_API_AUDIT_URL="http://${{ secrets.EC2_HOST_NGINX }}" \
              -e MS_CORE_IP="${{ secrets.EC2_HOST_MS_CORE }}" \
              -e MS_PROCESSING_IP="${{ secrets.EC2_HOST_MS_PROCESSING }}" \
              -e MS_STATUS_IP="${{ secrets.EC2_HOST_MS_STATUS }}" \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-web:latest
