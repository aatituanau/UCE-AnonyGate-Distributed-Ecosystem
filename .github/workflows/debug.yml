name: Debug EC2
on:
  push:
    branches: [ "QA" ]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DB_POSTGRES_IP_QA }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_QA }}
          proxy_host: ${{ secrets.EC2_HOST_NGINX_QA }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY_QA }}
          script: |
            echo "--- INSTALLING DOCKER AND POSTGRES ---"
            if ! command -v docker &> /dev/null; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose
              sudo systemctl start docker
              sudo systemctl enable docker
            fi
            sudo mkdir -p /home/ubuntu/postgres_data
            sudo docker stop postgres || true
            sudo docker rm postgres || true
            sudo docker run -d --name postgres --restart unless-stopped -v /home/ubuntu/postgres_data:/var/lib/postgresql/data -e POSTGRES_USER=anonygate -e POSTGRES_PASSWORD=anonygate_pass -e POSTGRES_DB=anonygate_db -p 5432:5432 postgres:16-alpine
            sudo docker ps -a
