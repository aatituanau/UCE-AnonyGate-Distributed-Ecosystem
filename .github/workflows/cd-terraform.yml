name: CD Terraform

on:
  push:
    branches: [ "main", "qa", "dev" ]

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Environment (DEV)
        if: github.ref == 'refs/heads/dev'
        run: echo "TF_ENV=dev" >> $GITHUB_ENV
        
      - name: Set Environment (QA)
        if: github.ref == 'refs/heads/qa'
        run: echo "TF_ENV=qa" >> $GITHUB_ENV
        
      - name: Set Environment (PROD)
        if: github.ref == 'refs/heads/main'
        run: echo "TF_ENV=prod" >> $GITHUB_ENV
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd infra/terraform/environments/${{ env.TF_ENV }}
          terraform init
          
      - name: Terraform Apply
        run: |
          cd infra/terraform/environments/${{ env.TF_ENV }}
          terraform apply -auto-approve
