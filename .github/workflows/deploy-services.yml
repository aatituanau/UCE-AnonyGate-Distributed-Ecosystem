name: Deploy Microservices to EC2

on:
  push:
    branches: [ "QA", "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_AUTH: ${{ github.repository }}-ms-auth
  IMAGE_NAME_ALIAS: ${{ github.repository }}-ms-alias

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MS-Auth
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ms-auth
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUTH }}:latest

      - name: Build and push MS-Alias
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ms-alias
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ALIAS }}:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Set Environment variables
        run: |
          if [ "${{ github.ref }}" == "refs/heads/QA" ]; then
            echo "ENV_PREFIX=qa" >> $GITHUB_ENV
            echo "ENV_SUFFIX=_QA" >> $GITHUB_ENV
          else
            echo "ENV_PREFIX=prod" >> $GITHUB_ENV
            echo "ENV_SUFFIX=_PROD" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials (for internal IP lookup)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets[format('AWS_ACCESS_KEY_ID{0}', env.ENV_SUFFIX)] }}
          aws-secret-access-key: ${{ secrets[format('AWS_SECRET_ACCESS_KEY{0}', env.ENV_SUFFIX)] }}
          aws-session-token: ${{ secrets[format('AWS_SESSION_TOKEN{0}', env.ENV_SUFFIX)] }}
          aws-region: us-east-1

      - name: Deploy MS-Auth and MS-Alias via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[format('EC2_HOST_MS_CORE{0}', env.ENV_SUFFIX)] }}
          username: ubuntu
          key: ${{ secrets[format('EC2_SSH_KEY{0}', env.ENV_SUFFIX)] }}
          proxy_host: ${{ secrets[format('EC2_HOST_NGINX{0}', env.ENV_SUFFIX)] }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets[format('EC2_SSH_KEY{0}', env.ENV_SUFFIX)] }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUTH }}:latest
            docker stop ms-auth || true
            docker rm ms-auth || true
            docker run -d --name ms-auth -p 3000:3000 --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUTH }}:latest
            
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ALIAS }}:latest
            docker stop ms-alias || true
            docker rm ms-alias || true
            docker run -d --name ms-alias -p 3001:3001 --restart unless-stopped ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ALIAS }}:latest
