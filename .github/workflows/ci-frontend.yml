name: CI Frontend (React/Vite)

on:
  push:
    branches: [ "main", "qa" ]
  pull_request:
    branches: [ "main", "qa" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Turbo Build
        run: npx turbo run build --filter="web" --filter="backoffice" --filter="status"

      - name: Turbo Lint
        run: npx turbo run lint --filter="web" --filter="backoffice" --filter="status"
